name: GitHub Actions CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm install
      - name: Display Repository Variables
  run: |
    echo "Application Name: ${{ vars.APP_NAME }}"
    echo "Environment: ${{ vars.ENVIRONMENT }}"
    echo "Node Version: ${{ vars.NODE_VERSION }}" 

      - name: Validate Secret
  run: |
    if [ -n "${{ secrets.ENV_SECRET }}" ]; then
      echo "Secret is available."
    else
      echo "Secret is missing."
      exit 1
    fi  

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist

      - name: Verify Artifact
        run: cat dist/build.txt

      - name: Run Tests
        run: npm test

  run-app:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Application
        run: npm start