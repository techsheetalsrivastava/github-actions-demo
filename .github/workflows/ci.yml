name: GitHub Actions CI Pipeline

permissions:
  contents: read
  packages: read

on:
  push:
    branches:
      - main

env:
  APP_NAME: ${{ vars.APP_NAME }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT }}
  NODE_VERSION: ${{ vars.NODE_VERSION }}
        

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Display Repository Variables
        run: |
          echo "Application Name: $APP_NAME"
          echo "Environment: $ENVIRONMENT"
          echo "Node Version: $NODE_VERSION"

      - name: Validate Secret
        run: |
          if [ -n "${{ secrets.ENV_SECRET }}" ]; then
            echo "Secret is available."
          else
            echo "Secret is missing."
            exit 1
          fi

      - name: Build Application
        run: npm run build

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/opspulse:${{ github.sha }} .
          docker tag ghcr.io/${{ github.repository_owner }}/opspulse:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/opspulse:latest

      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/opspulse:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/opspulse:latest  

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist

      - name: Verify Artifact
        run: cat dist/build.txt

      - name: Run Tests
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}

          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/opspulse:latest

            docker stop opspulse || true
            docker rm -f opspulse || true

            docker run -d \
              --name opspulse \
              -p 3000:3000 \
              ghcr.io/${{ github.repository_owner }}/opspulse:latest

            sleep 10

            curl --fail http://localhost:3000/status

  