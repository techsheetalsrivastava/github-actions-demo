name: GitHub Actions CI Pipeline

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main

env:
  APP_NAME: ${{ vars.APP_NAME }}
  ENVIRONMENT: ${{ vars.ENVIRONMENT }}
  NODE_VERSION: ${{ vars.NODE_VERSION }}

jobs:

  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Display Repository Variables
        run: |
          echo "Application Name: $APP_NAME"
          echo "Environment: $ENVIRONMENT"
          echo "Node Version: $NODE_VERSION"

      - name: Validate Secret
        run: |
          if [ -n "${{ secrets.ENV_SECRET }}" ]; then
            echo "Secret is available."
          else
            echo "Secret is missing."
            exit 1
          fi

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/


  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist

      - name: Verify Artifact
        run: ls -la dist

      - name: Run Tests
        run: npm test


  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/opspulse:${{ github.sha }} \
            -t ghcr.io/${{ github.repository_owner }}/opspulse:latest .

      - name: Push Docker Images
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/opspulse:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/opspulse:latest


  deploy:
    name: Deploy to Azure VM
    runs-on: ubuntu-latest
    needs:
      - test
      - docker

    steps:
      - name: Deploy Application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}

          script: |
            echo "${{ secrets.GHCR_VM }}" | docker login ghcr.io -u techsheetalsrivastava --password-stdin

            docker pull ghcr.io/${{ github.repository_owner }}/opspulse:latest

            docker stop opspulse || true
            docker rm opspulse || true

            docker run -d \
              --name opspulse \
              --restart unless-stopped \
              -p 3000:3000 \
              ghcr.io/${{ github.repository_owner }}/opspulse:latest

            docker ps


  health-check:
    name: Application Health Check
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Verify Application
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}

          script: |
            sleep 10

            curl --fail http://localhost:3000

            docker logs --tail=20 opspulse


  cleanup:
    name: Cleanup Docker Images
    runs-on: ubuntu-latest
    needs: health-check

    steps:
      - name: Cleanup VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}

          script: |
            docker image prune -f